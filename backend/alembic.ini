# Alembic configuration file.

[alembic]
# Path to migration scripts (relative to this file)
script_location = alembic

# Template used to generate migration file names.
file_template = %%(rev)s_%%(slug)s

# The SQLAlchemy URL is NOT set here — it's read from the DATABASE_URL
# environment variable in env.py. This avoids hardcoding credentials
# in a file that gets committed to git.
# sqlalchemy.url = <intentionally left blank>

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
